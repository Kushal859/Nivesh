services:
  - type: web
    name: nivesh-api
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi --workers 3 --timeout 60 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: nivesh-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nivesh-redis
          type: redis
          property: connectionString

  - type: worker
    name: nivesh-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A core worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          name: nivesh-api
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: nivesh-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nivesh-redis
          type: redis
          property: connectionString

  - type: redis
    name: nivesh-redis
    plan: free

databases:
  - name: nivesh-db
    databaseName: nivesh
    user: nivesh
